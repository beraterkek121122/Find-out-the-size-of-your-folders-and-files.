<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folder Bubble Visualizer | Pro Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', 'Arial', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 3em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1em;
        }

        .control-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .folder-select-area {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .folder-input {
            flex: 1;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .folder-input:hover {
            border-color: #667eea;
            background: rgba(0, 0, 0, 0.7);
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .progress-container {
            margin-top: 20px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 40px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .status-text {
            margin-top: 10px;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .bubble-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            min-height: 600px;
        }

        #bubbleCanvas {
            width: 100%;
            height: auto;
            background: radial-gradient(circle at 30% 20%, rgba(102, 126, 234, 0.1), rgba(0, 0, 0, 0.3));
            border-radius: 20px;
            cursor: pointer;
        }

        .info-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s;
        }

        .info-card:hover {
            transform: translateY(-5px);
        }

        .info-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #f093fb;
        }

        .stat-label {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
        }

        .folder-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .folder-item {
            padding: 10px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .folder-item:hover {
            background: rgba(102, 126, 234, 0.3);
            transform: translateX(5px);
        }

        .folder-name {
            font-weight: bold;
            color: white;
        }

        .folder-size {
            font-size: 0.9em;
            color: #667eea;
            float: right;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .app-container {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
            
            .btn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>🎈 Folder Bubble Visualizer Pro</h1>
            <p>Visualize folder sizes with nested bubbles</p>
        </div>

        <div class="control-panel">
            <div class="folder-select-area">
                <input type="file" id="folderInput" class="folder-input" webkitdirectory directory multiple>
                <button class="btn" onclick="analyzeFolders()">🔍 Analyze</button>
                <button class="btn btn-secondary" onclick="clearAll()">🗑 Clear</button>
            </div>
            
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill">0%</div>
                </div>
                <div class="status-text" id="statusText">Ready...</div>
            </div>
        </div>

        <div class="bubble-container">
            <canvas id="bubbleCanvas" width="1200" height="600"></canvas>
        </div>

        <div class="info-panel">
            <div class="info-card">
                <h3>📊 Statistics</h3>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="totalSize">0</div>
                        <div class="stat-label">Total Size</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="folderCount">0</div>
                        <div class="stat-label">Folder Count</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="largestFolder">-</div>
                        <div class="stat-label">Largest Folder</div>
                    </div>
                </div>
            </div>

            <div class="info-card">
                <h3>📁 Folder List</h3>
                <div class="folder-list" id="folderList">
                    <div style="text-align: center; color: rgba(255,255,255,0.5);">
                        Not analyzed yet
                    </div>
                </div>
            </div>

            <div class="info-card">
                <h3>🎨 Color Codes</h3>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <div><span style="display: inline-block; width: 30px; height: 30px; background: #ff6b6b; border-radius: 50%; margin-right: 10px;"></span> Very Large (>70%)</div>
                    <div><span style="display: inline-block; width: 30px; height: 30px; background: #ffa500; border-radius: 50%; margin-right: 10px;"></span> Large (40-70%)</div>
                    <div><span style="display: inline-block; width: 30px; height: 30px; background: #4ecdc4; border-radius: 50%; margin-right: 10px;"></span> Medium (20-40%)</div>
                    <div><span style="display: inline-block; width: 30px; height: 30px; background: #45b7d1; border-radius: 50%; margin-right: 10px;"></span> Small (10-20%)</div>
                    <div><span style="display: inline-block; width: 30px; height: 30px; background: #96ceb4; border-radius: 50%; margin-right: 10px;"></span> Very Small (<10%)</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let folderData = [];
        let animationId = null;
        let canvas = document.getElementById('bubbleCanvas');
        let ctx = canvas.getContext('2d');
        let bubbles = [];

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth - 60;
            canvas.height = 500;
            drawBubbles();
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            drawBubbles();
        });

        document.getElementById('folderInput').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            if (files.length > 0) {
                const folderName = files[0].webkitRelativePath.split('/')[0];
                document.getElementById('statusText').innerHTML = `✅ Seçildi: ${folderName}`;
            }
        });

        async function getFolderSizes(files) {
            if (files.length === 0) return [];
            
            const folderName = files[0].webkitRelativePath.split('/')[0];
            const subFolders = new Map();
            
            for (const file of files) {
                const relativePath = file.webkitRelativePath.substring(folderName.length + 1);
                const parts = relativePath.split('/');
                const rootFolder = parts[0];
                
                if (!subFolders.has(rootFolder)) {
                    subFolders.set(rootFolder, { size: 0, files: [], path: rootFolder });
                }
                subFolders.get(rootFolder).size += file.size;
                subFolders.get(rootFolder).files.push(file);
            }
            
            const results = [];
            for (let [name, data] of subFolders) {
                results.push({
                    name: name,
                    size: data.size,
                    fileCount: data.files.length,
                    path: data.path
                });
            }
            
            results.sort((a, b) => b.size - a.size);
            return results.slice(0, 15);
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            return (bytes / Math.pow(1024, i)).toFixed(1) + ' ' + sizes[i];
        }

        function getGradientColor(ratio, x, y, radius) {
            let gradient = ctx.createRadialGradient(x, y, radius * 0.2, x, y, radius);
            
            if (ratio > 0.7) {
                gradient.addColorStop(0, '#ff6b6b');
                gradient.addColorStop(0.5, '#ff4757');
                gradient.addColorStop(1, '#c0392b');
            } else if (ratio > 0.4) {
                gradient.addColorStop(0, '#ffa502');
                gradient.addColorStop(0.5, '#ff7f50');
                gradient.addColorStop(1, '#d35400');
            } else if (ratio > 0.2) {
                gradient.addColorStop(0, '#7bed9f');
                gradient.addColorStop(0.5, '#2ed573');
                gradient.addColorStop(1, '#1e90ff');
            } else if (ratio > 0.1) {
                gradient.addColorStop(0, '#70a1ff');
                gradient.addColorStop(0.5, '#1e90ff');
                gradient.addColorStop(1, '#0984e3');
            } else {
                gradient.addColorStop(0, '#a4b0be');
                gradient.addColorStop(0.5, '#747d8c');
                gradient.addColorStop(1, '#57606f');
            }
            
            return gradient;
        }

        function drawBubble(x, y, radius, color, name, size, isChild = false) {
            ctx.shadowBlur = 20;
            ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(x - radius * 0.3, y - radius * 0.3, radius * 0.2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.fill();
            
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            if (!isChild && radius > 40) {
                const childRadius = radius * 0.4;
                const angle = Date.now() / 1000;
                const offsetX = Math.sin(angle) * radius * 0.3;
                const offsetY = Math.cos(angle) * radius * 0.3;
                
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                drawBubble(x + offsetX, y + offsetY, childRadius, 
                          `rgba(${Math.random() * 255}, ${Math.random() * 255}, ${Math.random() * 255}, 0.3)`, 
                          '', 0, true);
                ctx.restore();
            }
            
            if (radius > 35) {
                ctx.font = `${Math.max(12, radius * 0.15)}px "Segoe UI"`;
                ctx.fillStyle = 'white';
                ctx.shadowBlur = 5;
                ctx.shadowColor = 'black';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                let displayName = name;
                if (displayName.length > 15) {
                    displayName = displayName.substring(0, 12) + '...';
                }
                ctx.fillText(displayName, x, y - 5);
                
                if (size) {
                    ctx.font = `${Math.max(10, radius * 0.1)}px "Segoe UI"`;
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                    ctx.fillText(formatSize(size), x, y + 15);
                }
            }
        }

        function drawBubbles() {
            if (!ctx || bubbles.length === 0) {
                if (bubbles.length === 0) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.font = '20px "Segoe UI"';
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                    ctx.textAlign = 'center';
                    ctx.fillText('📁 Select a folder and click the "Analyze" button', 
                                canvas.width / 2, canvas.height / 2);
                }
                return;
            }
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, 'rgba(102, 126, 234, 0.1)');
            gradient.addColorStop(1, 'rgba(118, 75, 162, 0.1)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const sortedBubbles = [...bubbles].sort((a, b) => b.radius - a.radius);
            
            for (const bubble of sortedBubbles) {
                const ratio = bubble.size / bubble.maxSize;
                const color = getGradientColor(ratio, bubble.x, bubble.y, bubble.radius);
                drawBubble(bubble.x, bubble.y, bubble.radius, color, bubble.name, bubble.size);
            }
        }

        function calculateBubblePositions(folders, maxSize) {
            const positions = [];
            const width = canvas.width;
            const height = canvas.height;
            const centerX = width / 2;
            const centerY = height / 2;
            
            const count = folders.length;
            const radius = Math.min(width, height) * 0.4;
            
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                const folder = folders[i];
                const ratio = folder.size / maxSize;
                
                const mainRadius = 40 + (ratio * 80);
                
                let x, y;
                if (count <= 5) {
                    x = centerX + Math.cos(angle) * radius;
                    y = centerY + Math.sin(angle) * radius;
                } else {
                    const t = i / count;
                    const r = radius * t;
                    const a = angle * 2;
                    x = centerX + Math.cos(a) * r;
                    y = centerY + Math.sin(a) * r;
                }
                
                positions.push({
                    ...folder,
                    x: x,
                    y: y,
                    radius: mainRadius,
                    ratio: ratio,
                    maxSize: maxSize
                });
            }
            
            return positions;
        }

        async function analyzeFolders() {
            const files = Array.from(document.getElementById('folderInput').files);
            
            if (files.length === 0) {
                alert('Please select a folder first!');
                return;
            }
            
            const progressContainer = document.getElementById('progressContainer');
            const progressFill = document.getElementById('progressFill');
            const statusText = document.getElementById('statusText');
            
            progressContainer.style.display = 'block';
            progressFill.style.width = '0%';
            statusText.innerHTML = '📊 Analyzing folders...';
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += 5;
                if (progress <= 90) {
                    progressFill.style.width = progress + '%';
                    progressFill.innerHTML = progress + '%';
                }
            }, 100);
            
            try {
                const folders = await getFolderSizes(files);
                
                clearInterval(interval);
                progressFill.style.width = '100%';
                progressFill.innerHTML = '100%';
                statusText.innerHTML = '✅ Analysis complete! Generating bubbles...';
                
                if (folders.length === 0) {
                    statusText.innerHTML = '⚠️ No subfolders found!';
                    return;
                }
                
                folderData = folders;
                const maxSize = folders[0].size;
                const totalSize = folders.reduce((sum, f) => sum + f.size, 0);
                
                document.getElementById('totalSize').innerHTML = formatSize(totalSize);
                document.getElementById('folderCount').innerHTML = folders.length;
                document.getElementById('largestFolder').innerHTML = folders[0].name;
                
                const folderListDiv = document.getElementById('folderList');
                folderListDiv.innerHTML = '';
                folders.forEach((folder, index) => {
                    const item = document.createElement('div');
                    item.className = 'folder-item';
                    item.onclick = () => highlightFolder(folder.name);
                    item.innerHTML = `
                        <div class="folder-name">${folder.name}</div>
                        <div class="folder-size">${formatSize(folder.size)}</div>
                        <div style="font-size: 0.8em; color: rgba(255,255,255,0.5);">
                            📄 ${folder.fileCount} files
                        </div>
                    `;
                    folderListDiv.appendChild(item);
                });
                
                resizeCanvas();
                setTimeout(() => {
                    bubbles = calculateBubblePositions(folders, maxSize);
                    drawBubbles();
                    startAnimation();
                    statusText.innerHTML = '✅ Ready! Click bubbles for details.';
                }, 500);
                
            } catch (error) {
                console.error('Error:', error);
                statusText.innerHTML = '❌ Error occurred: ' + error.message;
            } finally {
                setTimeout(() => {
                    progressContainer.style.display = 'none';
                }, 2000);
            }
        }
        
        function highlightFolder(folderName) {
            const bubble = bubbles.find(b => b.name === folderName);
            if (bubble) {
                ctx.save();
                ctx.shadowBlur = 30;
                ctx.shadowColor = 'gold';
                drawBubble(bubble.x, bubble.y, bubble.radius + 10, 'gold', bubble.name, bubble.size);
                ctx.restore();
                
                setTimeout(() => drawBubbles(), 2000);
            }
        }
        
        function startAnimation() {
            if (animationId) cancelAnimationFrame(animationId);
            
            let time = 0;
            function animate() {
                time += 0.02;
                bubbles.forEach((bubble, index) => {
                    const offsetX = Math.sin(time + index) * 5;
                    const offsetY = Math.cos(time * 0.7 + index) * 5;
                    bubble.originalX = bubble.x;
                    bubble.originalY = bubble.y;
                    bubble.currentX = bubble.x + offsetX;
                    bubble.currentY = bubble.y + offsetY;
                });
                
                drawBubbles();
                animationId = requestAnimationFrame(animate);
            }
            
            animate();
        }
        
        function clearAll() {
            folderData = [];
            bubbles = [];
            if (animationId) cancelAnimationFrame(animationId);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('folderInput').value = '';
            document.getElementById('totalSize').innerHTML = '0';
            document.getElementById('folderCount').innerHTML = '0';
            document.getElementById('largestFolder').innerHTML = '-';
            document.getElementById('folderList').innerHTML = '<div style="text-align: center; color: rgba(255,255,255,0.5);">Not analyzed yet</div>';
            document.getElementById('statusText').innerHTML = 'Ready...';
            
            ctx.font = '20px "Segoe UI"';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.textAlign = 'center';
            ctx.fillText('📁 Select a folder and click the "Analyze" button', 
                        canvas.width / 2, canvas.height / 2);
        }
        
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;
            
            for (const bubble of bubbles) {
                const dx = mouseX - bubble.x;
                const dy = mouseY - bubble.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance <= bubble.radius) {
                    alert(`📁 ${bubble.name}\n💾 Size: ${formatSize(bubble.size)}\n📄 File count: ${bubble.fileCount || '?'}`);
                    highlightFolder(bubble.name);
                    break;
                }
            }
        });
        
        resizeCanvas();
        clearAll();
    </script>
</body>
</html>
